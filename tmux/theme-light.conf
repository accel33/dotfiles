# Barra CLARA (modo día): usa el tema OFICIAL tokyonight_day (de folke) y re-inyecta
# el hook de continuum en status-right (para no romper el auto-guardado de sesiones).
source-file ~/.local/share/nvim/lazy/tokyonight/extras/tmux/tokyonight_day.tmux
set -ag status-right " #(~/.tmux/plugins/tmux-continuum/scripts/continuum_save.sh)"

# Barra CLARA (día): layout estilo tmux-power (flechas powerline) en colores flexoki teal.
# Construida con los bytes reales de la flecha (\ue0b0/\ue0b2). Requiere Nerd Font.
set -g status-position bottom
set -g status-justify left
set -g status-left-length 60
set -g status-right-length 80

set -g status-style "fg=#6f6e69,bg=#e6e4d9"
set -g status-bg "#e6e4d9"
set -g status-fg "#6f6e69"

# izquierda: user@host (teal) + sesión (gris) con flechas
set -g status-left "#[fg=#fffcf0,bg=#24837b,bold] #{USER}@#h #[fg=#24837b,bg=#dad8ce,none]#[fg=#24837b,bg=#dad8ce] #S #[fg=#dad8ce,bg=#e6e4d9,none]"

# ventanas con flechas; la activa en bloque teal
set -g window-status-separator ""
set -g window-status-format "#[fg=#e6e4d9,bg=#dad8ce]#[fg=#6f6e69,bg=#dad8ce] #I:#W#F #[fg=#dad8ce,bg=#e6e4d9]"
set -g window-status-current-format "#[fg=#e6e4d9,bg=#24837b]#[fg=#fffcf0,bg=#24837b,bold] #I:#W#F #[fg=#24837b,bg=#e6e4d9,none]"

# derecha: hora (gris) + fecha (teal) con flechas + hook de continuum
set -g status-right "#[fg=#dad8ce,bg=#e6e4d9,none]#[fg=#6f6e69,bg=#dad8ce] %H:%M #[fg=#24837b,bg=#dad8ce,none]#[fg=#fffcf0,bg=#24837b] %d-%b #[fg=#24837b,bg=#24837b]#(~/.tmux/plugins/tmux-continuum/scripts/continuum_save.sh)"

set -g pane-border-style "fg=#dad8ce"
set -g pane-active-border-style "fg=#24837b"
set -g message-style "bg=#24837b,fg=#fffcf0"
set -g mode-style "bg=#24837b,fg=#fffcf0"

set-option -g default-command "exec zsh -c 'stty -ixon; exec zsh'"
set -g default-terminal "tmux-256color"
set -ag terminal-overrides ",xterm-256color:RGB"

unbind C-b
set -g prefix C-a
bind C-a send-prefix

# Vim style pane selection
bind -r j resize-pane -D 5
bind -r k resize-pane -U 5
bind -r l resize-pane -R 5
bind -r h resize-pane -L 5

bind -r m resize-pane -Z

# Start windows and panes at 1, not 0
set -g base-index 1
set -g pane-base-index 1
set-window-option -g pane-base-index 1
set-option -g renumber-windows on

unbind %
unbind '"'
unbind r
unbind x
bind-key x kill-pane
bind v split-window -h
bind - split-window -v
bind r source-file ~/.tmux.conf
bind -r m resize-pane -Z

set -g mouse on
set-window-option -g mode-keys vi

bind-key -T copy-mode-vi 'v' send -X begin-selection # empezar selección con "v"
bind-key -T copy-mode-vi 'y' send -X copy-pipe "pbcopy" # copiar al portapapeles (sin salir de copy mode, como josean)

# al soltar el arrastre del mouse: copiar al portapapeles de macOS y salir de copy-mode
bind-key -T copy-mode-vi MouseDragEnd1Pane send -X copy-pipe-and-cancel "pbcopy"

# remove delay for exiting insert mode with ESC in Neovim
set -sg escape-time 10

# tpm plugin
set -g @plugin 'tmux-plugins/tpm'

# tmux_power_theme
set -g @plugin 'wfxr/tmux-power'
set -g @tmux_power_theme 'colour6'

# PowerKit plugin
# set -g @plugin 'fabioluciano/tmux-powerkit'
# # Basic configuration
# set -g @powerkit_plugins "datetime,battery,cpu,memory,git,hostname"
# set -g @powerkit_theme "tokyo-night"
# set -g @powerkit_theme_variant "night"

# list of tmux plugins
set -g @plugin 'christoomey/vim-tmux-navigator' # navegar tmux pane y entre neovim y tmux
set -g @plugin 'tmux-plugins/tmux-resurrect' # persist tmux sessions after computer restart
set -g @plugin 'tmux-plugins/tmux-continuum' # automatically saves sessions for you every 15 minutes
set -g @plugin 'fabioluciano/tmux-tokyo-night'


set -g @resurrect-capture-pane-contents 'on'
set -g @continuum-restore 'on'

# Initialize TMUX plugin manager (keep this line at the very bottom of tmux.conf)
run '~/.tmux/plugins/tpm/tpm'

display-message "✔️ tmux config reloaded"
